global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "auth-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["auth-service:4000"]

  - job_name: "product-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["product-service:4001"]

  - job_name: "order-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["order-service:4002"]

  - job_name: "user-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["user-service:4003"]

  - job_name: "chat-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["chat-service:4004"]
