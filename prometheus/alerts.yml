groups:
  - name: sre-service-alerts
    rules:
      - alert: ServiceDown
        expr: up{job=~".*-service"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.job }} for at least 30 seconds."

      - alert: ServiceUnhealthy
        expr: sre_service_health == 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} health endpoint reports an unhealthy state"
          description: "{{ $labels.service }} is running, but its /health check reports degraded dependencies."

      - alert: HighErrorRate
        expr: |
          (
            sum by (service) (rate(sre_http_errors_total[2m]))
            /
            sum by (service) (rate(sre_http_requests_total[2m]))
          ) > 0.05
          and
          sum by (service) (rate(sre_http_requests_total[2m])) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} has a high HTTP error rate"
          description: "More than 5% of recent requests to {{ $labels.service }} returned HTTP 4xx/5xx responses."

      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum by (service, le) (rate(sre_http_request_duration_seconds_bucket[2m]))
          ) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.service }} p95 latency is above 1 second"
          description: "The 95th percentile request latency for {{ $labels.service }} is above the assignment threshold."

      - alert: HighProcessCpu
        expr: |
          sum by (job) (
            rate(process_cpu_user_seconds_total{job=~".*-service"}[2m])
            +
            rate(process_cpu_system_seconds_total{job=~".*-service"}[2m])
          ) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} process CPU usage is high"
          description: "{{ $labels.job }} is using more than 0.8 CPU cores for two minutes."

      - alert: HighProcessMemory
        expr: process_resident_memory_bytes{job=~".*-service"} > 300 * 1024 * 1024
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} process memory usage is high"
          description: "{{ $labels.job }} is using more than 300 MB of resident memory."

      - alert: ServiceRestartedRecently
        expr: changes(process_start_time_seconds{job=~".*-service"}[10m]) > 0
        for: 0s
        labels:
          severity: info
        annotations:
          summary: "{{ $labels.job }} restarted recently"
          description: "The process start time changed in the last 10 minutes, indicating a container or service restart."
