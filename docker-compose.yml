services:
  frontend:
    build:
      context: ./lol
      dockerfile: frontend/Dockerfile
    container_name: sre-frontend
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - chat-service

  auth-service:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SERVICE_NAME: auth-service
      PORT: 4000
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-portfolio-1a377}
      FIREBASE_CREDENTIALS_PATH: /etc/secrets/serviceAccountKey.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "4000:4000"
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:-./lol/serviceAccountKey.json}:/etc/secrets/serviceAccountKey.json:ro

  product-service:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: product-service
    environment:
      SERVICE_NAME: product-service
      PORT: 4001
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/shop}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-portfolio-1a377}
      FIREBASE_CREDENTIALS_PATH: /etc/secrets/serviceAccountKey.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "4001:4001"
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:-./lol/serviceAccountKey.json}:/etc/secrets/serviceAccountKey.json:ro
    depends_on:
      mongodb:
        condition: service_healthy

  order-service:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      SERVICE_NAME: order-service
      PORT: 4002
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/shop}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-portfolio-1a377}
      FIREBASE_CREDENTIALS_PATH: /etc/secrets/serviceAccountKey.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "4002:4002"
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:-./lol/serviceAccountKey.json}:/etc/secrets/serviceAccountKey.json:ro
    depends_on:
      mongodb:
        condition: service_healthy

  user-service:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      SERVICE_NAME: user-service
      PORT: 4003
      ORDER_SERVICE_URL: http://order-service:4002
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-portfolio-1a377}
      FIREBASE_CREDENTIALS_PATH: /etc/secrets/serviceAccountKey.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "4003:4003"
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:-./lol/serviceAccountKey.json}:/etc/secrets/serviceAccountKey.json:ro
    depends_on:
      - order-service

  chat-service:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: chat-service
    environment:
      SERVICE_NAME: chat-service
      PORT: 4004
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/shop}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-portfolio-1a377}
      FIREBASE_CREDENTIALS_PATH: /etc/secrets/serviceAccountKey.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "4004:4004"
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:-./lol/serviceAccountKey.json}:/etc/secrets/serviceAccountKey.json:ro
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: sre-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - chat-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:
